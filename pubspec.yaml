name: bhagavad_gita
description: A beautiful devotional app to listen to Bhagavad Gita audio

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Package to generate App Icons
  flutter_launcher_icons: ^0.13.1
  # Package to generate Native Splash Screen (Fixes blank screen)
  flutter_native_splash: ^2.3.10

# 1. App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

# 2. Native Splash Screen Configuration
flutter_native_splash:
  color: "#FFFFFF" # Background color of the splash
  image: "assets/logo.png" # The logo to show immediately
  android_12:
    image: "assets/logo.png"
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/