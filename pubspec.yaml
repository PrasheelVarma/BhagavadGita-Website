name: bhagvad_gita
description: A beautiful devotional app to listen to Bhagavad Gita audio

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0   # good version

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/               # ← includes ALL files & subfolders inside assets/
    # OR more explicit (both ways work):
    # - assets/logo.png
    # - assets/audio.m4a
    # - assets/background.png   # if you plan to use it later

  # flutter_launcher_icons:   # uncomment later when you want app icon
  #   android: true
  #   ios: true
  #   image_path: "assets/logo.png"